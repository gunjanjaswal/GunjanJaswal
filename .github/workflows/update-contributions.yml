name: Update Open Source Contributions

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render merged external PRs into the README
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./.github/scripts/contributions.js');
            await run({ github, context, core });

      - name: Commit if changed
        run: |
          git config user.name "gunjanjaswal"
          git config user.email "gunjanjaswal@gmail.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No contribution changes."
          else
            git commit -m "Auto-update open source contributions"
            git push
          fi
